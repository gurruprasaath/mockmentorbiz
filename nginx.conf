worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Security: hide nginx version
    server_tokens off;

    # Gzip for faster frontend delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Allow large file uploads (resumes, audio)
    client_max_body_size 50M;

    # Upstream backend (service name from docker-compose)
    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ------------------------------------------------------------------
        # API proxy — all /api/* requests go to FastAPI
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # AI calls (LLM, Groq, LangGraph) can take up to 120s
            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
        }

        # ------------------------------------------------------------------
        # WebSocket proxy — /ws/* endpoints
        # ------------------------------------------------------------------
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ------------------------------------------------------------------
        # Static assets — long cache
        # ------------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ------------------------------------------------------------------
        # SPA routing — all other paths serve index.html
        # ------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
